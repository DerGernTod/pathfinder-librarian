# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
    pull_request:
    workflow_dispatch:
        inputs:
            update_snapshots:
                description: "Update Playwright snapshots?"
                type: boolean
                default: false

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            - run: bun run lint

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            - run: bun run format -- --check

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            - run: bun run test

    e2e:
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
            options: --user 1001
        permissions:
            contents: write # For snapshot updates
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            # Run normally on PR, or with --update-snapshots if dispatch input is true
            - name: Run Playwright tests
              run: |
                  if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
                    bun run e2e -- --update-snapshots
                  else
                    bun run e2e
                  fi
            - name: Commit and Push Snapshot Updates
              if: github.event.inputs.update_snapshots == 'true'
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add vrtests/__snapshots__/**/*.png
                  git commit -m "chore: Update Playwright snapshots (linux)" || echo "No changes to commit"
                  git push

    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            - run: bun run check
