name: Deploy Main

on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Lowercase repo name
              run: |
                  echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

            - name: Log in to GHCR
              run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build and Push
              run: |
                  IMAGE_ID=ghcr.io/${{ env.REPO_LOWER }}:latest
                  docker build . -t $IMAGE_ID
                  docker push $IMAGE_ID
            - name: Install SSH Key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
            - name: Deploy to Server
              run: |
                  docker context create remote --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

                  # Pull the latest image onto the remote host
                  docker --context remote pull ghcr.io/${{ env.REPO_LOWER }}:latest

                  # Stop and remove the existing container if it exists
                  docker --context remote rm -f project-pathfinderlibrarian || true

                  # Run the new container
                  docker --context remote run -d \
                    --name project-pathfinderlibrarian \
                    --network opencode-server_backend \
                    --restart unless-stopped \
                    -v pathfinder_db:/app/data \
                    ghcr.io/${{ env.REPO_LOWER }}:latest
