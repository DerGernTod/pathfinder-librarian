name: Deploy Main

on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Lowercase repo name
              run: |
                  echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

            - uses: oven-sh/setup-bun@v2
            - uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
            - run: bun install --frozen-lockfile
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ env.REPO_LOWER }}:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Install SSH Key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
            - name: Deploy to Server
              run: |
                  docker context create remote --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

                  # Guard: ensure the compose plugin is present on the remote host.
                  docker --context remote compose version

                  # Pull fresh app image
                  docker --context remote pull ghcr.io/${{ env.REPO_LOWER }}:latest

                  # One-time migration ONLY: if a legacy standalone container named
                  # project-pathfinderlibrarian exists AND is not compose-managed
                  # (compose stamps containers with com.docker.compose.project), remove
                  # it so compose can claim the name. Once compose owns the container
                  # the label is present and this branch is skipped on every later
                  # deploy (zero downtime; compose handles its own rolling replace).
                  if ! docker --context remote inspect project-pathfinderlibrarian \
                        --format '{{ index .Config.Labels "com.docker.compose.project" }}' 2>/dev/null \
                        | grep -q .; then
                      docker --context remote rm -f project-pathfinderlibrarian || true
                  fi

                  # Deploy via compose + prod override. The prod override mounts the
                  # external pathfinder_db volume (existing live data) and joins ingress.
                  APP_IMAGE=ghcr.io/${{ env.REPO_LOWER }}:latest \
                  CONTAINER_NAME=project-pathfinderlibrarian \
                  GOOGLE_AI_API_KEY="${{ secrets.GOOGLE_AI_API_KEY }}" \
                  WEBAUTHN_ORIGIN="https://pathfinderlibrarian.projects.raudner.dev" \
                  WEBAUTHN_RP_ID="pathfinderlibrarian.projects.raudner.dev" \
                  docker --context remote compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

                  docker --context remote image prune -f
