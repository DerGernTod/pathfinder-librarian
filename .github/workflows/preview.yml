name: PR Preview
on:
    pull_request:
        types: [opened, synchronize, closed]
jobs:
    deploy:
        if: github.event.action != 'closed'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            # 1. Create a lowercase version of the repo name
            - name: Lowercase repo name
              run: |
                  echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

            # 2. Login to GHCR
            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # 3. Build and push using the new REPO_LOWER variable
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  push: true
                  # Note the use of env.REPO_LOWER here
                  tags: ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }}

            # 4. Setup SSH for Context
            - name: Install SSH Key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

            # 5. Deploy via compose with per-PR project name
            - name: Deploy to Home Server
              run: |
                  docker context create home-server --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

                  docker --context home-server compose version

                  docker --context home-server pull ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }}

                  # One-time migration ONLY: if a legacy standalone PR container
                  # exists and is NOT compose-managed, remove it so compose can
                  # claim the name. Skipped once compose owns it (label present),
                  # so re-pushes to the same PR have zero container-removal downtime.
                  PR_NAME="pr-${{ github.event.number }}-pathfinderlibrarian"
                  if ! docker --context home-server inspect "$PR_NAME" \
                        --format '{{ index .Config.Labels "com.docker.compose.project" }}' 2>/dev/null \
                        | grep -q .; then
                      docker --context home-server rm -f "$PR_NAME" || true
                  fi

                  # Base + preview override: joins opencode-server_backend for Caddy
                  # routing, but app_data + qdrant_data stay project-scoped (per-PR,
                  # cleaned by `down -v`).
                  APP_IMAGE=ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }} \
                  CONTAINER_NAME=pr-${{ github.event.number }}-pathfinderlibrarian \
                  docker --context home-server compose -p pr-${{ github.event.number }} -f docker-compose.yml -f docker-compose.preview.yml up -d --remove-orphans
            - name: Post Preview URL to PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = context.issue.number;
                      // Matching your Caddy regex: pr{number}-{name}
                      const url = `https://pr${prNumber}-pathfinderlibrarian.prs.raudner.dev`;

                      const body = `🚀 **Preview Deployment Ready!**\n\n| Service | URL |\n| :--- | :--- |\n| **Pathfinder Librarian** | [${url}](${url}) |\n\n_Built from commit ${context.sha}_`;

                      // Check if a comment already exists to avoid spamming
                      const comments = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                      });
                      const botComment = comments.data.find(comment => comment.body.includes('Preview Deployment Ready!'));

                      if (botComment) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: botComment.id,
                          body: body
                        });
                      } else {
                        await github.rest.issues.createComment({
                          issue_number: prNumber,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: body
                        });
                      }
    cleanup:
        if: github.event.action == 'closed'
        runs-on: ubuntu-latest
        steps:
            - name: Install SSH Key
              uses: shimataro/ssh-key-action@v2
              with:
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

            - name: Remove PR Stack
              run: |
                  docker context create home-server --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
                  docker --context home-server compose -p pr-${{ github.event.number }} -f docker-compose.yml -f docker-compose.preview.yml down -v --remove-orphans
