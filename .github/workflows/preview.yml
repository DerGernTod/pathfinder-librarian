name: PR Preview
on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 1. Create a lowercase version of the repo name
      - name: Lowercase repo name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 2. Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and push using the new REPO_LOWER variable
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          # Note the use of env.REPO_LOWER here
          tags: ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }}

      # 4. Setup SSH for Context
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      # 5. Deploy using the new REPO_LOWER variable
      - name: Deploy to Home Server
        run: |
          docker context create home-server --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          
          # Pull using lowercase name
          docker --context home-server pull ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }}
          
          docker --context home-server stop pr-${{ github.event.number }}-pathfinderlibrarian || true
          docker --context home-server rm pr-${{ github.event.number }}-pathfinderlibrarian || true
          
          docker --context home-server run -d \
            --name pr-${{ github.event.number }}-pathfinderlibrarian \
            --network opencode-server_backend \
            --restart unless-stopped \
            ghcr.io/${{ env.REPO_LOWER }}:pr-${{ github.event.number }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          
      - name: Remove PR Container
        run: |
          docker context create home-server --docker "host=ssh://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          docker --context home-server stop pr-${{ github.event.number }}-pathfinderlibrarian || true
          docker --context home-server rm pr-${{ github.event.number }}-pathfinderlibrarian || true